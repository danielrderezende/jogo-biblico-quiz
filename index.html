<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bíblico - Aventura</title>
    <style>
        :root {
            --primary-color: #1a252f;
            --secondary-color: #d4af37; /* Dourado */
            --bg-color: #f0f3f4;
            --text-color: #2c3e50;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --timer-color: #3498db;
            --locked-color: #95a5a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            position: relative;
        }

        /* ----- CABEÇALHO GLOBAL (PONTUAÇÃO) ----- */
        .global-header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--secondary-color);
        }

        .score-display {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-display span {
            color: var(--secondary-color);
            font-size: 1.5rem;
        }

        /* ----- TELA INICIAL (MAPA DE NÍVEIS) ----- */
        #start-screen {
            padding: 30px;
            text-align: center;
        }

        .title-header {
            font-size: 2rem;
            color: var(--text-color);
            margin-bottom: 5px;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .levels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .level-card {
            background-color: white;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .level-card.unlocked {
            border-color: var(--secondary-color);
            background-color: #fffbf0;
        }

        .level-card.unlocked:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        .level-card.locked {
            background-color: #f8f9f9;
            border-color: #e5e8e8;
            cursor: not-allowed;
            color: var(--locked-color);
        }

        .level-icon {
            font-size: 2rem;
        }

        .level-number {
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* ----- TELA DO QUIZ ----- */
        #quiz-screen { display: none; }

        .quiz-info-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 25px;
            background-color: #f8f9f9;
            font-weight: bold;
            color: var(--text-color);
            border-bottom: 1px solid #ecf0f1;
        }

        .timer-container {
            width: 100%;
            height: 10px;
            background-color: #ecf0f1;
        }

        .timer-bar {
            height: 100%;
            background-color: var(--timer-color);
            width: 100%;
            transition: width 1s linear, background-color 0.3s;
        }

        .quiz-body { padding: 30px; }

        h2#question {
            font-size: 1.25rem;
            color: var(--text-color);
            margin-bottom: 25px;
            text-align: center;
            font-weight: 600;
            line-height: 1.4;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: white;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            padding: 16px;
            font-size: 1rem;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
            font-weight: 500;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--secondary-color);
            background-color: #fcfdfe;
        }

        .option-btn:disabled { cursor: not-allowed; }

        .option-btn.correct {
            background-color: var(--success-color);
            color: white;
            border-color: var(--success-color);
        }

        .option-btn.wrong {
            background-color: var(--error-color);
            color: white;
            border-color: var(--error-color);
        }

        /* Animação de pontos ganhos */
        .points-earned {
            text-align: center;
            color: var(--success-color);
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 15px;
            min-height: 25px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .quiz-footer {
            padding: 15px 30px;
            display: flex;
            justify-content: flex-end;
            background-color: #f8f9f9;
        }

        .action-btn {
            background-color: var(--secondary-color);
            color: #fff;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }
        
        .action-btn:hover { background-color: #b5952f; }
        #next-btn { display: none; }

        /* ----- TELA DE RESULTADOS ----- */
        #result-screen {
            display: none;
            padding: 40px 30px;
            text-align: center;
        }

        .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background-color: white;
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            border: 6px solid var(--secondary-color);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .score-circle .big-score {
            font-size: 2.2rem;
            font-weight: bold;
        }

        .score-circle .small-text {
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .stats-box {
            background: #f8f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            color: var(--text-color);
        }

        .stats-box div { margin: 5px 0; }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="global-header">
            <div>🏆 Quiz Bíblico</div>
            <div class="score-display">Pts: <span id="global-score">0</span></div>
        </div>

        <div id="start-screen">
            <h1 class="title-header">Jornada Bíblica</h1>
            <p class="subtitle">Complete os níveis para avançar e acumule pontos!</p>
            
            <div class="levels-grid" id="levels-grid">
                </div>
            
            <button class="action-btn" style="margin-top: 25px; background-color: var(--error-color);" onclick="resetProgress()">Zerar Progresso</button>
        </div>

        <div id="quiz-screen">
            <div class="timer-container"><div class="timer-bar" id="timer-bar"></div></div>
            
            <div class="quiz-info-bar">
                <div id="level-display">Nível 1</div>
                <div>Tempo: <span id="time-left">15</span>s</div>
                <div><span id="current-question-text">1</span>/<span id="total-questions-text">5</span></div>
            </div>

            <div class="quiz-body">
                <h2 id="question">Carregando pergunta...</h2>
                <div class="options-container" id="options"></div>
                <div class="points-earned" id="points-earned"></div>
            </div>

            <div class="quiz-footer">
                <button id="next-btn" class="action-btn" onclick="nextQuestion()">Avançar ➔</button>
            </div>
        </div>

        <div id="result-screen">
            <h1 class="title-header" id="result-title">Nível Concluído!</h1>
            
            <div class="score-circle">
                <div class="big-score" id="level-score-display">+0</div>
                <div class="small-text">Pontos ganhos</div>
            </div>

            <div class="stats-box">
                <div>Acertos: <strong id="correct-answers-display">0</strong></div>
                <div>Bônus de Tempo: <strong id="time-bonus-display">0</strong> pts</div>
            </div>
            
            <p class="subtitle" id="feedback-message">Calculando resultado...</p>
            
            <button class="action-btn" onclick="returnToMap()">Voltar ao Mapa 🌍</button>
        </div>

    </div>

    <script>
        // --- BANCO DE DADOS DAS FASES ---
        const levelsData = [
            {
                id: 1,
                title: "O Início",
                questions: [
                    { q: "Quem construiu a arca?", options: ["Moisés", "Noé", "Abraão", "Davi"], correct: 1 },
                    { q: "Qual o primeiro livro da Bíblia?", options: ["Êxodo", "Salmos", "Gênesis", "Mateus"], correct: 2 },
                    { q: "Quantos dias durou a criação?", options: ["3", "6", "7", "40"], correct: 1 }
                ]
            },
            {
                id: 2,
                title: "Patriarcas",
                questions: [
                    { q: "Quem foi o pai da nação de Israel?", options: ["Isaque", "Jacó", "Abraão", "José"], correct: 2 },
                    { q: "Quem foi vendido como escravo pelos irmãos?", options: ["José", "Benjamin", "Ruben", "Davi"], correct: 0 },
                    { q: "Qual o nome da esposa de Isaque?", options: ["Sara", "Raquel", "Rebeca", "Lia"], correct: 2 }
                ]
            },
            {
                id: 3,
                title: "O Êxodo",
                questions: [
                    { q: "Quem abriu o Mar Vermelho pelo poder de Deus?", options: ["Arão", "Moisés", "Josué", "Calebe"], correct: 1 },
                    { q: "O que Deus enviou do céu para alimentar o povo?", options: ["Pão", "Maná", "Trigo", "Peixe"], correct: 1 },
                    { q: "Quantas pragas atingiram o Egito?", options: ["7", "10", "12", "40"], correct: 1 }
                ]
            },
            {
                id: 4,
                title: "Reis de Israel",
                questions: [
                    { q: "Quem foi o primeiro rei de Israel?", options: ["Davi", "Salomão", "Saul", "Samuel"], correct: 2 },
                    { q: "Qual rei pediu sabedoria a Deus?", options: ["Davi", "Ezequias", "Josias", "Salomão"], correct: 3 },
                    { q: "Quem derrotou Golias?", options: ["Saul", "Davi", "Jônatas", "Sansão"], correct: 1 }
                ]
            },
            {
                id: 5,
                title: "Novo Testamento",
                questions: [
                    { q: "Em qual cidade Jesus nasceu?", options: ["Nazaré", "Jerusalém", "Belém", "Cafarnaum"], correct: 2 },
                    { q: "Quem batizou Jesus?", options: ["Pedro", "João Batista", "Paulo", "Tiago"], correct: 1 },
                    { q: "Quantos apóstolos Jesus escolheu?", options: ["10", "12", "7", "3"], correct: 1 }
                ]
            }
        ];

        // --- VARIÁVEIS GLOBAIS ---
        let totalScore = parseInt(localStorage.getItem('bibleQuizScore')) || 0;
        let unlockedLevels = parseInt(localStorage.getItem('bibleQuizUnlocked')) || 1;
        
        let currentLevelObj = null;
        let currentQuestionIndex = 0;
        
        // Controle de pontuação da partida
        let sessionScore = 0;
        let sessionCorrectAnswers = 0;
        let sessionTimeBonus = 0;
        
        // Timer
        const maxTime = 15; // 15 segundos por pergunta
        let timeLeft = maxTime;
        let timerInterval;

        // Elementos DOM
        const dom = {
            globalScore: document.getElementById('global-score'),
            levelsGrid: document.getElementById('levels-grid'),
            screens: {
                start: document.getElementById('start-screen'),
                quiz: document.getElementById('quiz-screen'),
                result: document.getElementById('result-screen')
            },
            qBody: {
                question: document.getElementById('question'),
                options: document.getElementById('options'),
                pointsMsg: document.getElementById('points-earned'),
                nextBtn: document.getElementById('next-btn')
            },
            ui: {
                timerBar: document.getElementById('timer-bar'),
                timeText: document.getElementById('time-left'),
                levelDisplay: document.getElementById('level-display'),
                currNum: document.getElementById('current-question-text'),
                totalNum: document.getElementById('total-questions-text')
            }
        };

        // --- INICIALIZAÇÃO ---
        function initApp() {
            updateGlobalScore();
            renderLevelMap();
        }

        function updateGlobalScore() {
            dom.globalScore.innerText = totalScore;
            localStorage.setItem('bibleQuizScore', totalScore);
            localStorage.setItem('bibleQuizUnlocked', unlockedLevels);
        }

        // --- RENDERIZAR MAPA ---
        function renderLevelMap() {
            dom.levelsGrid.innerHTML = '';
            
            levelsData.forEach(level => {
                const isUnlocked = level.id <= unlockedLevels;
                const card = document.createElement('div');
                card.className = `level-card ${isUnlocked ? 'unlocked' : 'locked'}`;
                
                card.innerHTML = `
                    <div class="level-icon">${isUnlocked ? '📖' : '🔒'}</div>
                    <div class="level-number">Nível ${level.id}</div>
                    <div style="font-size: 0.8rem">${level.title}</div>
                `;

                if (isUnlocked) {
                    card.onclick = () => startLevel(level.id);
                }

                dom.levelsGrid.appendChild(card);
            });
        }

        // --- INICIAR NÍVEL ---
        function startLevel(levelId) {
            currentLevelObj = levelsData.find(l => l.id === levelId);
            currentQuestionIndex = 0;
            
            // Reseta variáveis da sessão
            sessionScore = 0;
            sessionCorrectAnswers = 0;
            sessionTimeBonus = 0;

            dom.ui.levelDisplay.innerText = `Nível ${levelId}`;
            dom.ui.totalNum.innerText = currentLevelObj.questions.length;

            dom.screens.start.style.display = 'none';
            dom.screens.quiz.style.display = 'block';

            loadQuestion();
        }

        // --- CARREGAR PERGUNTA ---
        function loadQuestion() {
            clearInterval(timerInterval);
            
            dom.qBody.options.innerHTML = '';
            dom.qBody.pointsMsg.style.opacity = '0';
            dom.qBody.nextBtn.style.display = 'none';
            dom.ui.currNum.innerText = currentQuestionIndex + 1;

            const q = currentLevelObj.questions[currentQuestionIndex];
            dom.qBody.question.innerText = q.q;

            q.options.forEach((optText, index) => {
                const btn = document.createElement('button');
                btn.innerText = optText;
                btn.className = 'option-btn';
                btn.onclick = () => selectOption(btn, index);
                dom.qBody.options.appendChild(btn);
            });

            startTimer();
        }

        // --- SISTEMA DE TEMPO ---
        function startTimer() {
            timeLeft = maxTime;
            updateTimerUI();

            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerUI();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleAnswer(null, -1); // -1 significa tempo esgotado
                }
            }, 1000);
        }

        function updateTimerUI() {
            dom.ui.timeText.innerText = Math.max(0, timeLeft);
            const perc = (timeLeft / maxTime) * 100;
            dom.ui.timerBar.style.width = `${perc}%`;

            if (perc <= 30) {
                dom.ui.timerBar.style.backgroundColor = 'var(--error-color)';
                dom.ui.timeText.style.color = 'var(--error-color)';
            } else {
                dom.ui.timerBar.style.backgroundColor = 'var(--timer-color)';
                dom.ui.timeText.style.color = 'var(--timer-color)';
            }
        }

        // --- LÓGICA DE RESPOSTA ---
        function selectOption(btn, index) {
            clearInterval(timerInterval); // Para o relógio
            handleAnswer(btn, index);
        }

        function handleAnswer(selectedBtn, selectedIndex) {
            const q = currentLevelObj.questions[currentQuestionIndex];
            const isCorrect = (selectedIndex === q.correct);
            const allBtns = dom.qBody.options.querySelectorAll('.option-btn');
            
            // Trava os botões e mostra a correta
            allBtns.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === q.correct) btn.classList.add('correct');
            });

            if (isCorrect) {
                // Cálculo de Pontos: 100 base + 10 por segundo restante
                const basePoints = 100;
                const bonus = timeLeft * 10;
                const totalGained = basePoints + bonus;
                
                sessionCorrectAnswers++;
                sessionTimeBonus += bonus;
                sessionScore += totalGained;
                totalScore += totalGained;

                updateGlobalScore();

                dom.qBody.pointsMsg.innerText = `+${totalGained} Pontos! (Bônus de tempo: ${bonus})`;
                dom.qBody.pointsMsg.style.color = 'var(--success-color)';
            } else {
                if (selectedBtn) selectedBtn.classList.add('wrong');
                dom.qBody.pointsMsg.innerText = "Resposta Incorreta!";
                dom.qBody.pointsMsg.style.color = 'var(--error-color)';
            }

            dom.qBody.pointsMsg.style.opacity = '1';
            dom.qBody.nextBtn.style.display = 'block';
        }

        // --- AVANÇAR ---
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentLevelObj.questions.length) {
                loadQuestion();
            } else {
                finishLevel();
            }
        }

        // --- FINALIZAR NÍVEL ---
        function finishLevel() {
            dom.screens.quiz.style.display = 'none';
            dom.screens.result.style.display = 'block';

            document.getElementById('level-score-display').innerText = `+${sessionScore}`;
            document.getElementById('correct-answers-display').innerText = `${sessionCorrectAnswers}/${currentLevelObj.questions.length}`;
            document.getElementById('time-bonus-display').innerText = sessionTimeBonus;

            const perc = sessionCorrectAnswers / currentLevelObj.questions.length;
            const feedback = document.getElementById('feedback-message');
            const title = document.getElementById('result-title');

            // Regra para passar de nível: acertar mais da metade
            if (perc > 0.5) {
                title.innerText = "Nível Concluído! 🎉";
                feedback.innerText = "Excelente trabalho! Você desbloqueou novos desafios.";
                
                // Desbloqueia próximo nível se existir
                if (currentLevelObj.id === unlockedLevels && unlockedLevels < levelsData.length) {
                    unlockedLevels++;
                    updateGlobalScore();
                }
            } else {
                title.innerText = "Fim de Jogo";
                feedback.innerText = "Você precisa de mais acertos para passar desta fase. Tente novamente!";
            }
        }

        // --- VOLTAR AO MENU ---
        function returnToMap() {
            dom.screens.result.style.display = 'none';
            renderLevelMap();
            dom.screens.start.style.display = 'block';
        }

        // --- RESETAR PROGRESSO (Para testes) ---
        function resetProgress() {
            if(confirm("Tem certeza? Isso vai apagar todos os seus pontos e bloquear as fases novamente.")) {
                totalScore = 0;
                unlockedLevels = 1;
                updateGlobalScore();
                renderLevelMap();
            }
        }

        // Inicia o app
        initApp();
    </script>
</body>
</html>
